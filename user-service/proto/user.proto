syntax = "proto3";

package user;

option go_package = "./proto";

service UserService {
    rpc GetUser (CreateUserRequest) returns (UserResponse);
    rpc Login (LoginRequest) returns (LoginResponse);
}

message CreateUserRequest{
    string name = 1;
    string email = 2;
    string password = 3;
}

message UserResponse{
    int32 id = 1;
    string name = 2;
    string email = 3;
}

message LoginRequest{
    string email = 1;
    string password = 2;
}

message LoginResponse{
    string token = 1;
}